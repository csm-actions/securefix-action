---
name: autofix.ci
on: pull_request
permissions: {}
jobs:
  autofix:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for OIDC
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.60.1
      - name: Update aqua-checksums.json
        run: aqua upc -prune
        env:
          GITHUB_TOKEN: ${{github.token}}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache-dependency-path: package-lock.json
          cache: npm
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}
      - run: npm ci
      - name: Restore .npmrc to avoid committing the registry auth token
        run: git checkout -- .npmrc
      - name: Update JSONSchema
        run: npm run schema
      - name: Format using prettier
        run: npm run fmt

      - name: Fix newlines
        run: git ls-files | xargs nllint -f -s
      - name: Update actions in the document
        env:
          GITHUB_TOKEN: ${{github.token}}
        run: |
          git ls-files | grep -E '\.md$' | grep -v -E "^changelogs/" | xargs pinact run -u
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
